{% extends "base.html" %}

{% block content %}

<div class="result-container">

<div class="result-card">
    <div style="text-align:center; margin-bottom:30px;">

<a href="{{ url_for('peer_mentor') }}" class="mentor-btn">
Become a Peer Mentor 🚀
</a>

</div>

<h2>Become a Peer Mentor</h2>

<form action="{{ url_for('register_peer') }}" method="POST">

<input type="text" name="name" placeholder="Your Name" required>

<br><br>

<input type="text" name="skills" placeholder="Skills you can teach (comma separated)" required>

<br><br>

<input type="text" name="experience" placeholder="Your Role / Experience">

<br><br>
<input type="email" name="email" placeholder="Your Email" required>
<br><br>
<button class="mentor-btn">Register as Mentor</button>

</form>

</div>

</div>

{% endblock %}
