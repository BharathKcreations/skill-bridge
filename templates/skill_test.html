{% extends "base.html" %}

{% block content %}

<div class="result-container">

<div class="result-card">

<h2>Skill Assessment Test</h2>

<p style="color:#22d3ee; margin-bottom:20px;">
Answer the questions to validate your knowledge
</p>

<form action="{{ url_for('submit_test') }}" method="POST">

{% for q in questions %}

{% set q_index = loop.index0 %}

<div style="margin-bottom:25px; text-align:left;">

<p style="font-weight:bold; font-size:16px;">
Question {{ loop.index }}: {{ q.question }}
</p>

{% for option in q.options %}

<label style="display:block; margin-bottom:8px; cursor:pointer;">

<input type="radio"
       name="q{{ q_index }}"
       value="{{ option }}"
       required>

{{ option }}

</label>

{% endfor %}

</div>

{% endfor %}

<button type="submit" class="mentor-btn">
Submit Test 🚀
</button>

</form>

</div>

</div>

{% endblock %}
