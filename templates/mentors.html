{% extends "base.html" %}
{% block content %}

<h2 style="text-align: center;">available mentors</h2>

{% if mentors|length == 0 %}
    <p>No mentors available.</p>
{% else %}

    {% for mentor in mentors %}

        <div class="mentor-card" style="text-align: center;">
            <h3>{{ mentor.name }}</h3>
            <p>{{ mentor.experience }}</p>
            <p>Match Score: {{ mentor.match_score }}%</p>

            <form action="{{ url_for('connect') }}" method="POST">
                <input type="hidden" name="mentor_name" value="{{ mentor.name }}">
                <button type="submit">Request Session</button>
            </form>
        </div>

    {% endfor %}

{% endif %}

{% endblock %}
